name: MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy==1.26.4 pandas==2.2.2 scikit-learn==1.4.2 matplotlib
          pip install -r requirements.txt --no-deps
          pip install dvc psycopg2-binary

      - name: Wait for Postgres
        run: sleep 10

      - name: Init DB
        run: |
          PGPASSWORD=pass psql -h localhost -U postgres -d db -f db/init.sql

      - name: Run DVC pipeline
        run: |
          dvc repro

      - name: Install CML
        run: npm install -g @dvcorg/cml

      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Model Metrics" > report.md
          cat metrics/metrics.json >> report.md

          echo "" >> report.md
          echo "## ROC Curve" >> report.md
          echo "ROC slika generisana: metrics/roc.png" >> report.md

          cml comment create report.md